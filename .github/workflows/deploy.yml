name: Continuous Deployment

on:
  push:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: dangkhoa31204

jobs:
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and Push Identity Service
      uses: docker/build-push-action@v5
      with:
        context: .
        file: src/PRM.Services.Identity/Dockerfile
        push: true
        tags: |
          ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/prm-identity-service:latest
          ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/prm-identity-service:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build and Push Restaurant Service
      uses: docker/build-push-action@v5
      with:
        context: .
        file: src/PRM.Services.Restaurant/Dockerfile
        push: true
        tags: |
          ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/prm-restaurant-service:latest
          ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/prm-restaurant-service:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build and Push Order Service
      uses: docker/build-push-action@v5
      with:
        context: .
        file: src/PRM.Services.Order/Dockerfile
        push: true
        tags: |
          ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/prm-order-service:latest
          ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/prm-order-service:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build and Push API Gateway
      uses: docker/build-push-action@v5
      with:
        context: .
        file: src/PRM.Gateway/Dockerfile
        push: true
        tags: |
          ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/prm-gateway:latest
          ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/prm-gateway:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  deploy-to-vps:
    name: Deploy to VPS via SSH
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Deploy to Server via SSH
      uses: appleboy/ssh-action@v1.0.3
      env:
        VPS_HOST: ${{ secrets.VPS_SSH_HOST }}
      if: env.VPS_HOST != ''
      with:
        host: ${{ secrets.VPS_SSH_HOST }}
        username: ${{ secrets.VPS_SSH_USER }}
        key: ${{ secrets.VPS_SSH_KEY }}
        port: ${{ secrets.VPS_SSH_PORT || 22 }}
        envs: REGISTRY,IMAGE_OWNER
        script: |
          cd ${{ secrets.VPS_DEPLOY_PATH || '/var/www/prm-backend' }}
          git pull origin main
          docker compose -f docker-compose.prod.yml pull
          docker compose -f docker-compose.prod.yml up -d --remove-orphans
          docker image prune -f
