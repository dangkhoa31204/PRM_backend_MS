services:
  # 1. Web Service: Identity Service
  - type: web
    name: identity-service
    env: docker
    dockerfilePath: src/PRM.Services.Identity/Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: PORT
        value: 8080
      - key: ConnectionStrings__DefaultConnection
        fromDatabase:
          name: prm-db-new
          property: connectionString
      - key: Jwt__Key
        sync: false
      - key: Jwt__Issuer
        value: "PRM.Services.Identity"
      - key: Jwt__Audience
        value: "PRM.Services"

  # 2. Web Service: Restaurant Service
  - type: web
    name: restaurant-service
    env: docker
    dockerfilePath: src/PRM.Services.Restaurant/Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: PORT
        value: 8080
      - key: ConnectionStrings__DefaultConnection
        fromDatabase:
          name: prm-db-new
          property: connectionString
      - key: Jwt__Key
        sync: false
      - key: Jwt__Issuer
        value: "PRM.Services.Identity"
      - key: Jwt__Audience
        value: "PRM.Services"
      - key: AppBaseUrl
        value: "https://prm-gateway.onrender.com"
      - key: CloudinarySettings__CloudName
        value: "dkppq6bsj"
      - key: CloudinarySettings__ApiKey
        value: "995222553571651"
      - key: CloudinarySettings__ApiSecret
        sync: false

  # 3. Web Service: Order Service
  - type: web
    name: order-service
    env: docker
    dockerfilePath: src/PRM.Services.Order/Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: PORT
        value: 8080
      - key: ConnectionStrings__DefaultConnection
        fromDatabase:
          name: prm-db-new
          property: connectionString
      - key: Jwt__Key
        sync: false
      - key: Jwt__Issuer
        value: "PRM.Services.Identity"
      - key: Jwt__Audience
        value: "PRM.Services"
      - key: Services__RestaurantService
        value: "http://restaurant-service:8080/"

  # 4. Web Service: AI Service (Qwen Chatbot)
  - type: web
    name: ai-service
    env: docker
    dockerfilePath: src/PRM.Services.AI/Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: PORT
        value: 8080
      - key: Qwen__BaseUrl
        value: "https://dashscope-intl.aliyuncs.com/compatible-mode/v1"
      - key: Qwen__ApiKey
        sync: false
      - key: Qwen__Model
        value: "qwen2.5-7b-instruct"

  # 5. Public Web Service: API Gateway
  - type: web
    name: prm-gateway
    env: docker
    dockerfilePath: src/PRM.Gateway/Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: PORT
        value: 8080
      - key: Jwt__Key
        sync: false
      - key: Jwt__Issuer
        value: "PRM.Services.Identity"
      - key: Jwt__Audience
        value: "PRM.Services"
      - key: Proxy__Services__Identity
        value: "http://identity-service:8080"
      - key: Proxy__Services__Restaurant
        value: "http://restaurant-service:8080"
      - key: Proxy__Services__Order
        value: "http://order-service:8080"
      - key: Proxy__Services__AI
        value: "http://ai-service:8080"

databases:
  # 6. PostgreSQL Database (Dùng chung cho các Service)
  - name: prm-db-new
    databaseName: prm_db_new
    user: prm_user
    plan: free
