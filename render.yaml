services:
  # 1. Web Service: Identity Service
  - type: web
    name: identity-service
    env: docker
    dockerfilePath: src/PRM.Services.Identity/Dockerfile
    plan: free
    envVars:
      - key: PORT
        value: 8080
      - key: ConnectionStrings__DefaultConnection
        fromDatabase:
          name: prm-db
          property: connectionString
      - key: Jwt__Key
        sync: false
      - key: Jwt__Issuer
        value: "PRM.Services.Identity"
      - key: Jwt__Audience
        value: "PRM.Services"

  # 2. Web Service: Restaurant Service
  - type: web
    name: restaurant-service
    env: docker
    dockerfilePath: src/PRM.Services.Restaurant/Dockerfile
    plan: free
    envVars:
      - key: PORT
        value: 8080
      - key: ConnectionStrings__DefaultConnection
        fromDatabase:
          name: prm-db
          property: connectionString
      - key: Jwt__Key
        sync: false
      - key: Jwt__Issuer
        value: "PRM.Services.Identity"
      - key: Jwt__Audience
        value: "PRM.Services"
      - key: AppBaseUrl
        fromService:
          type: web
          name: prm-gateway
          property: host

  # 3. Web Service: Order Service
  - type: web
    name: order-service
    env: docker
    dockerfilePath: src/PRM.Services.Order/Dockerfile
    plan: free
    envVars:
      - key: PORT
        value: 8080
      - key: ConnectionStrings__DefaultConnection
        fromDatabase:
          name: prm-db
          property: connectionString
      - key: Jwt__Key
        sync: false
      - key: Jwt__Issuer
        value: "PRM.Services.Identity"
      - key: Jwt__Audience
        value: "PRM.Services"
      - key: Services__RestaurantService
        fromService:
          type: web
          name: restaurant-service
          property: hostport

  # 4. Public Web Service: API Gateway
  - type: web
    name: prm-gateway
    env: docker
    dockerfilePath: src/PRM.Gateway/Dockerfile
    plan: free
    envVars:
      - key: PORT
        value: 8080
      - key: Jwt__Key
        sync: false
      - key: Jwt__Issuer
        value: "PRM.Services.Identity"
      - key: Jwt__Audience
        value: "PRM.Services"
      - key: IDENTITY_HOST
        fromService:
          type: web
          name: identity-service
          property: host
      - key: RESTAURANT_HOST
        fromService:
          type: web
          name: restaurant-service
          property: host
      - key: ORDER_HOST
        fromService:
          type: web
          name: order-service
          property: host

databases:
  # 5. PostgreSQL Database (Dùng chung cho 3 Service)
  - name: prm-db
    databaseName: prm_db
    user: prm_user
    plan: free
