# ─── CẤU HÌNH NGINX REVERSE PROXY CHO PRM BACKEND ──────────────────────────────
#
# Hướng dẫn sử dụng:
# 1. Sao chép file này vào thư mục của Nginx trên VPS:
#    sudo cp nginx.conf /etc/nginx/sites-available/prm-backend
# 2. Tạo liên kết để kích hoạt cấu hình:
#    sudo ln -s /etc/nginx/sites-available/prm-backend /etc/nginx/sites-enabled/
# 3. Kiểm tra cấu hình xem có lỗi không:
#    sudo nginx -t
# 4. Tải lại Nginx để áp dụng:
#    sudo systemctl reload nginx
# 5. Cấu hình HTTPS (SSL) tự động qua Let's Encrypt:
#    sudo certbot --nginx -d yourdomain.com

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com api.yourdomain.com; # <--- THAY BẰNG DOMAIN CỦA BẠN HOẶC IP VPS

    # Cho phép upload ảnh dung lượng lớn (nếu có tính năng upload ảnh món ăn)
    client_max_body_size 50M;

    # Nhật ký log
    access_log /var/log/nginx/prm_backend_access.log;
    error_log /var/log/nginx/prm_backend_error.log;

    # Proxy các request vào API Gateway chạy ở port 5000
    location / {
        proxy_pass http://127.0.0.1:5000;
        
        # Thiết lập header chuyển tiếp thông tin client
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Cấu hình hỗ trợ WebSocket (Bắt buộc cho SignalR /hubs/staff)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        
        # Thời gian timeout kết nối (Tránh ngắt kết nối WebSocket)
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
